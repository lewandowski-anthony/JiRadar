version: '3.8'

services:
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: jiradar-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    networks:
      - jiradar-network

  redisinsight:
    image: redis/redisinsight:latest
    container_name: jiradar-redisinsight
    ports:
      - "8001:5540"
    depends_on:
      - valkey
    networks:
      - jiradar-network

volumes:
  valkey-data:
    driver: local
  redisinsight-data:
    driver: local

networks:
  jiradar-network:
    driver: bridge