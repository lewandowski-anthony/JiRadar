name: 'Build Node Front-end'
description: 'Installe Node et build le projet React/Vite'

inputs:
  node_version:
    description: 'Version of Node.js to use'
    required: false
    default: '20'
  push_image:
    description: 'True if you want to push the image on repository'
    required: true
    default: 'false'
  image_tag:
    description: 'The tag of the Docker image (e.g., 1.0.0)'
    required: true
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js version ${{ inputs.node_version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}
        cache: 'npm'
        cache-dependency-path: front-end/package-lock.json

    - name: Build Front-end
      shell: bash
      run: |
        cd front-end
        npm install
        npm run build

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./front-end
        push: ${{ inputs.push_image == 'true' }}
        tags: |
          ghcr.io/${{ github.repository }}/jiradar-front:${{ inputs.image_tag }}
          ghcr.io/${{ github.repository }}/jiradar-front:latest