name: 'Build Node Front-end'
description: 'Installe Node, lance les tests avec coverage, et build le projet React/Vite'

inputs:
  push_image:
    description: 'True if you want to push the image on repository'
    required: true
    default: 'false'
  image_tag:
    description: 'The tag of the Docker image (e.g., 1.0.0)'
    required: true
    default: 'latest'
  node_version:
    description: 'The version of Node.js to use'
    required: false
    default: '20'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}
        cache: 'npm'
        cache-dependency-path: front-end/package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd front-end
        npm ci

    - name: Run Tests with Coverage
      shell: bash
      run: |
        cd front-end
        npm run test -- --coverage

    - name: SonarCloud Front Scan
      uses: SonarSource/sonarqube-scan-action@v8
      with:
        projectBaseDir: ./front-end
      env:
        SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

    - name: Docker Build & Push
      uses: ./.github/actions/docker-build-push
      with:
        context: ./front-end
        image_name: jiradar-front
        image_tag: ${{ inputs.image_tag }}
        push_image: ${{ inputs.push_image }}

    - name: Security Scan Front-end (Trivy)
      if: ${{ github.event_name == 'pull_request' }}
      uses: ./.github/actions/security-scan
      with:
        module-name: "Jiradar Front-end"
        module-path: "./front-end"