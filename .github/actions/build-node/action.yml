name: 'Build Node Front-end'
description: 'Installe Node, lance les tests avec coverage, et build le projet React/Vite'

inputs:
  push_image:
    description: 'True if you want to push the image on repository'
    required: true
    default: 'false'
  image_tag:
    description: 'The tag of the Docker image (e.g., 1.0.0)'
    required: true
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: front-end/package-lock.json

    - name: Install dependencies
      shell: bash
      run: |
        cd front-end
        npm ci

    - name: Run Tests with Coverage
      shell: bash
      run: |
        cd front-end
        npm run test -- --coverage

    - name: Docker Build & Push
      uses: ./.github/actions/docker-build-push
      with:
        context: ./front-end
        image_name: jiradar-front
        image_tag: ${{ inputs.image_tag }}
        push_image: ${{ inputs.push_image }}