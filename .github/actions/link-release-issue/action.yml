name: 'Link Release PR to Tracking Issue'
description: 'Automates the creation or update of a GitHub Issue, triggers workflow transitions, and links it to a Release Pull Request'

inputs:
  pr_json:
    description: 'The JSON string of the PR output from release-please'
    required: true
  github_token:
    description: 'The GITHUB_TOKEN with issues:write and pull-requests:write permissions'
    required: true

runs:
  using: "composite"
  steps:
    - name: Create Issue if not already linked
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        PR_NUMBER=$(echo '${{ inputs.pr_json }}' | jq '.number')
        PR_TITLE=$(echo '${{ inputs.pr_json }}' | jq -r '.title')
        
        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          echo "::error::No valid PR number found in pr_json input."
          exit 1
        fi

        ACTOR="${{ github.actor }}"
        EXPECTED_ISSUE_TITLE="[RELEASE] Deployement of ${PR_TITLE}"
        
        CURRENT_PR_BODY=$(gh pr view $PR_NUMBER --json body --jq '.body')
        if echo "$CURRENT_PR_BODY" | grep -q "Closes #"; then
          echo "::notice::Issue creation skipped"
          exit 0
        fi

        EXISTING_ISSUE_NUMBER=$(gh issue list --state open --search "in:title \"$EXPECTED_ISSUE_TITLE\"" --json number --jq '.[0].number')

        if [ -n "$EXISTING_ISSUE_NUMBER" ] && [ "$EXISTING_ISSUE_NUMBER" != "null" ]; then
          NEW_PR_BODY="${CURRENT_PR_BODY}"$'\n\n'"Closes #${EXISTING_ISSUE_NUMBER}"
          gh pr edit $PR_NUMBER --body "$NEW_PR_BODY"
          echo "::notice::Issue creation skipped"
          exit 0
        fi

        ISSUE_BODY="This is an automated tracking issue generated for the Release Pull Request #${PR_NUMBER}. This issue simulates a full delivery lifecycle (Start -> In Progress -> In Review)."
        
        ISSUE_NUMBER=$(gh issue create \
          --title "$EXPECTED_ISSUE_TITLE" \
          --body "$ISSUE_BODY" \
          --assignee "$ACTOR" \
          --label "release" | grep -oE '[0-9]+$')
        
        sleep 1

        NEW_PR_BODY="${CURRENT_PR_BODY}"$'\n\n'"Closes #${ISSUE_NUMBER}"
        gh pr edit $PR_NUMBER --body "$NEW_PR_BODY"

        ISSUE_LINK="https://github.com/${{ github.repository }}/issues/${ISSUE_NUMBER}"
        echo "::notice::Issue create : ${ISSUE_LINK}"