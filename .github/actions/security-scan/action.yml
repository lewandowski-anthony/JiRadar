name: 'Security Scan (Trivy)'
description: 'Scans the repository for high and critical vulnerabilities + secrets, and posts a summary comment to the PR.'
inputs:
  module-name:
    description: 'Name of the module being scanned (e.g., back-end, front-end)'
    required: true
  path:
    description: 'The specific directory to scan'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Run Trivy vulnerability scanner (JSON)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.path }}
        scanners: 'vuln,secret'
        format: 'json'
        output: 'trivy-report.json'
        severity: 'HIGH,CRITICAL'

    - name: Convert Trivy JSON to Markdown Summary
      shell: bash
      run: |
        echo "### 🛡️ Trivy Security Report - ${{ inputs.module-name }}" > trivy-report.md
        echo "" >> trivy-report.md
        echo "| Target | Type | Name / ID | Severity |" >> trivy-report.md
        echo "| :--- | :--- | :--- | :---: |" >> trivy-report.md
        
        jq -r '.Results[]? | 
          (select(.Vulnerabilities != null) | .Target as $t | .Type as $type | .Vulnerabilities[] | "| \($t) | \($type) | \(.PkgName // .VulnerabilityID) | \(.Severity) |"),
          (select(.Secrets != null) | .Target as $t | .Type as $type | .Secrets[] | "| \($t) | \($type) | \(.Title) | \(.Severity) |")' trivy-report.json >> trivy-report.md 2>/dev/null || true
        
        if [ $(wc -l < trivy-report.md) -eq 3 ]; then
          # On nettoie les entêtes de tableau inutiles pour afficher un beau message propre
          echo "### 🛡️ Trivy Security Report - ${{ inputs.module-name }}" > trivy-report.md
          echo "" >> trivy-report.md
          echo "🎉 **All good!** No high or critical vulnerabilities/secrets detected." >> trivy-report.md
        fi

    - name: Post Trivy Report to PR Comment
      uses: mshick/add-pr-comment@v2
      if: always()
      with:
        allow-repeats: false
        message-path: 'trivy-report.md'

    - name: Check for vulnerabilities
      shell: bash
      run: |
        if [ -s trivy-report.json ] && jq -e '.Results[]? | select(.Vulnerabilities != null or .Secrets != null)' trivy-report.json > /dev/null; then
          exit 1
        fi