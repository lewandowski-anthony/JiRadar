name: 'Security Scan (Trivy)'
description: 'Scans the repository for high and critical vulnerabilities + secrets, and posts a summary comment to the PR.'
inputs:
  module-name:
    description: 'Name of the module being scanned (e.g., back-end, front-end)'
    required: true
  module-path:
    description: 'The specific directory to scan'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Run Trivy vulnerability scanner (Generate Markdown Report)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.module-path }}
        scanners: 'vuln,secret'
        format: 'template'
        template: '__github_markdown__'
        output: 'trivy-report.md'
        severity: 'HIGH,CRITICAL'

    - name: Format final report header
      shell: bash
      run: |
        sed -i '1i ### 🛡️ Trivy Security Report - ${{ inputs.module-name }}\n' trivy-report.md

    - name: Post Trivy Report to PR Comment
      uses: mshick/add-pr-comment@v2
      if: always()
      with:
        allow-repeats: false
        message-path: 'trivy-report.md'

    - name: Check and Block PR if findings found
      shell: bash
      run: |
        if grep -q "|" trivy-report.md; then
          if grep -q "No Vulnerabilities" trivy-report.md && grep -q "No Secrets" trivy-report.md; then
            echo "All clean!"
          else
            echo "❌ Blocking PR: High/Critical Vulnerabilities or Secrets detected!"
            exit 1
          fi
        fi