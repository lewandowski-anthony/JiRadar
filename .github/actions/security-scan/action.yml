name: 'Security Scan (Trivy)'
description: 'Scans the repository for high and critical vulnerabilities + secrets, and posts a summary comment to the PR.'
inputs:
  module-name:
    description: 'Name of the module being scanned (e.g., back-end, front-end)'
    required: true
  path:
    description: 'The specific directory to scan'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Run Trivy vulnerability scanner (JSON)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: ${{ inputs.path }}
        scanners: 'vuln,secret'
        format: 'json'
        output: 'trivy-report.json'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'

    - name: Convert Trivy JSON to Markdown Summary
      shell: bash
      run: |
        if [ ! -f trivy-report.json ]; then
          echo "Error: trivy-report.json not found."
          exit 1
        fi

        jq -r '.Results[]? | 
          (.Target as $t | .Type as $type | 
            ((.Vulnerabilities[]? | "| \($t) | \($type) | \(.PkgName // .VulnerabilityID) | \(.Severity) |"),
             (.Secrets[]? | "| \($t) | \($type) | \(.Title) | \(.Severity) |"))
          )' trivy-report.json > findings.tmp

        echo "### 🛡️ Trivy Security Report - ${{ inputs.module-name }}" > trivy-report.md
        echo "" >> trivy-report.md

        if [ -s findings.tmp ]; then
          echo "| Target | Type | Name / ID | Severity |" >> trivy-report.md
          echo "| :--- | :--- | :--- | :---: |" >> trivy-report.md
          cat findings.tmp >> trivy-report.md
        else
          echo "🎉 **All good!** No high or critical vulnerabilities/secrets detected." >> trivy-report.md
        fi

        rm -f findings.tmp

    - name: Post Trivy Report to PR Comment
      uses: mshick/add-pr-comment@v2
      if: always()
      with:
        allow-repeats: false
        message-path: 'trivy-report.md'

    - name: Check for vulnerabilities
      shell: bash
      run: |
        if jq -e '.Results[]? | select(.Vulnerabilities != null or .Secrets != null)' trivy-report.json > /dev/null; then
          echo "Blocking PR: High or Critical security findings detected!"
          exit 1
        fi