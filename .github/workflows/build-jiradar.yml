name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # JOB 1 : RELEASE & ORCHESTRATION
  # ==========================================
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      tag_name: ${{ steps.release.outputs.tag_name || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Release Please
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

  # ==========================================
  # JOB 2 : BUILD BACK-END
  # ==========================================
  build-back:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: needs.release-please.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Back-end
        uses: ./.github/actions/build-maven
        with:
          push_image: ${{ needs.release-please.outputs.release_created }}
          image_tag: ${{ needs.release-please.outputs.tag_name }}

  # ==========================================
  # JOB 3 : BUILD FRONT-END (En parallèle)
  # ==========================================
  build-front:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: needs.release-please.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Front-end
        uses: ./.github/actions/build-node
        with:
          push_image: ${{ needs.release-please.outputs.release_created }}
          image_tag: ${{ needs.release-please.outputs.tag_name }}