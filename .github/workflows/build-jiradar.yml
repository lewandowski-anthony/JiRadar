name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      tag_name: ${{ steps.release.outputs.tag_name || 'latest' }}
      prs_created: ${{ steps.release.outputs.prs_created || 'false' }}
      pr: ${{ steps.release.outputs.pr }}
      clean_tag: ${{ steps.format-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

      - name: Format Docker Tag
        id: format-tag
        shell: bash
        run: |
          RAW_TAG="${{ steps.release.outputs.tag_name || 'latest' }}"
          echo "version=${RAW_TAG#v}" >> $GITHUB_OUTPUT

  update-versions:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Project Versions
        uses: ./.github/actions/update-project-versions
        with:
          pr_output: ${{ needs.release-please.outputs.pr }}
          new_version: ${{ needs.release-please.outputs.clean_tag }}

  build-back:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: needs.release-please.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Back-end
        uses: ./.github/actions/build-maven
        with:
          push_image: ${{ needs.release-please.outputs.release_created }}
          image_tag: ${{ needs.release-please.outputs.clean_tag }}

  build-front:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        if: needs.release-please.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Front-end
        uses: ./.github/actions/build-node
        with:
          push_image: ${{ needs.release-please.outputs.release_created }}
          image_tag: ${{ needs.release-please.outputs.clean_tag }}