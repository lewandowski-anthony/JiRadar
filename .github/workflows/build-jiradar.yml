name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || 'false' }}
      tag_name: ${{ steps.release.outputs.tag_name || 'latest' }}
      prs_created: ${{ steps.release.outputs.prs_created || 'false' }}
      pr: ${{ steps.release.outputs.pr }}
      clean_tag: ${{ steps.format-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ github.token }}
          release-type: simple
      - name: Format Docker Tag
        id: format-tag
        shell: bash
        run: |
          RAW_TAG="${{ steps.release.outputs.tag_name || 'latest' }}"
          echo "version=${RAW_TAG#v}" >> $GITHUB_OUTPUT

  update-versions:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Link Release PR to an Issue
        uses: ./.github/actions/link-release-issue
        with:
          pr_json: ${{ needs.release-please.outputs.pr }}
          github_token: ${{ github.token }}
      - name: Update Project Versions
        uses: ./.github/actions/update-project-versions
        with:
          pr_output: ${{ needs.release-please.outputs.pr }}

  build-back:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Login to GHCR
        if: needs.release-please.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & Push Back-end
        uses: ./.github/actions/build-maven
        with:
          push_image: ${{ needs.release-please.outputs.release_created }}
          image_tag: ${{ needs.release-please.outputs.clean_tag }}

  build-front:
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Login to GHCR
        if: needs.release-please.outputs.release_created == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & Push Front-end
        uses: ./.github/actions/build-node
        with:
          push_image: ${{ needs.release-please.outputs.release_created }}
          image_tag: ${{ needs.release-please.outputs.clean_tag }}

  sonar-analysis:
    runs-on: ubuntu-latest
    needs: [ build-back, build-front ]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Re-generate Quick Coverage
        shell: bash
        run: |
          cd back-end && mvn clean compile test
          cd ../front-end && npm ci && npm run test -- --coverage --watchAll=false

      - name: SonarCloud Full Scan
        uses: SonarSource/sonarqube-scan-action@v8
        with:
          args: >
            -Dsonar.sources=back-end/src/main/java,front-end/src
            -Dsonar.tests=back-end/src/test/java,front-end/src
            -Dsonar.java.binaries=back-end/target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=back-end/target/site/jacoco/jacoco.xml
            -Dsonar.javascript.lcov.reportPaths=front-end/coverage/lcov.info
            -Dsonar.exclusions=**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,front-end/src/**/constants/**,.github/**,*.yml,*.yaml
            -Dsonar.cpd.exclusions=front-end/src/**/constants/**
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}