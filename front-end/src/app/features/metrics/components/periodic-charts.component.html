<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-5 flex flex-col">
    <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
      <span class="text-blue-500">■</span> Issues Flow
    </h3>
    <div class="relative h-64 w-full mt-auto">
      <canvas baseChart [data]="issuesData()" [options]="commonOptions" type="bar"></canvas>
    </div>
  </div>

  <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-5 flex flex-col">
    <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
      <span class="text-purple-500">■</span> Code Reviews
    </h3>
    <div class="relative h-64 w-full mt-auto">
      <canvas baseChart [data]="reviewsData()" [options]="commonOptions" type="bar"></canvas>
    </div>
  </div>

  <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-5 flex flex-col">
    <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
      <span class="text-purple-500">■</span> Performance Rates
    </h3>
    <div class="relative h-64 w-full mt-auto">
      <canvas baseChart [data]="ratesData()" [options]="commonOptions" type="bar"></canvas>
    </div>
  </div>

  <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-5 flex flex-col">
    <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
      <span class="text-red-500">■</span> Issue Type Distribution (Last Period)
    </h3>
    <div class="relative h-64 w-full mt-auto">
      <canvas baseChart [data]="typeDistributionData()" [options]="doughnutOptions" type="doughnut"></canvas>
    </div>
  </div>

</div>
