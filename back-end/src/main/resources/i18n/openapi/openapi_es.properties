###############################################################################
# =============================================================================
# SWAGGER GENERAL DOCUMENTATION
# =============================================================================
###############################################################################

openapi.info.title=API Backend Jiradar
openapi.info.description=API REST para la recopilación de métricas e historiales de herramientas de seguimiento de incidencias.

###############################################################################
# =============================================================================
# CAPA DE CONTROLADOR - DOCUMENTACIÓN DE ENDPOINTS
# =============================================================================
###############################################################################

# --- Etiquetas Globales y Parámetros de Ruta Comunes ---
openapi.endpoint.user.tag.description=Endpoints para recuperar perfiles, métricas e historiales de usuarios.
openapi.endpoint.user.param.tracker=El identificador del proveedor de seguimiento de incidencias (ej: jira, gitlab).

# --- GET /me : Información del Perfil ---
openapi.endpoint.user.me.summary=Obtener usuario autenticado
openapi.endpoint.user.me.description=Devuelve el perfil completo del usuario actualmente autenticado en el rastreador.

# --- GET /me/metrics : Analítica Principal ---
openapi.endpoint.user.metrics.summary=Calcular métricas de rendimiento
openapi.endpoint.user.metrics.description=Genera informes de actividad del desarrollador filtrados por proyectos y rango de fechas.

# --- GET /me/history : Cronología Paginada ---
openapi.endpoint.user.history.summary=Recuperar historial de actividad
openapi.endpoint.user.history.description=Devuelve una lista paginada en orden cronológico inverso de los eventos del ciclo de vida del usuario.

###############################################################################
# =============================================================================
# OBJETOS DE TRANSFERENCIA DE DATOS (DTO) - CAPA DE ESQUEMA
# =============================================================================
###############################################################################

# -----------------------------------------------------------------------------
# UserDto
# -----------------------------------------------------------------------------
openapi.dto.user.description=Detalles de información del perfil de un usuario.
openapi.dto.user.email=Dirección de correo electrónico profesional del usuario.
openapi.dto.user.name=Nombre completo a mostrar del usuario.

# -----------------------------------------------------------------------------
# UserHistoryEventDto
# -----------------------------------------------------------------------------
openapi.dto.history.description=Detalles de un evento histórico desencadenado por la transición de un usuario en una incidencia.
openapi.dto.history.issueKey=Clave identificadora única de la incidencia.
openapi.dto.history.issueSummary=Título resumido de la incidencia.
openapi.dto.history.issueType=Categoría de tipo de la incidencia rastreada.
openapi.dto.history.date=Fecha y hora en que ocurrió el evento (formato ISO 8601).
openapi.dto.history.transitionType=Ruta de estado de transición del flujo de trabajo ejecutada.

# -----------------------------------------------------------------------------
# UserMetricsDto (Envoltorio Raíz)
# -----------------------------------------------------------------------------
openapi.dto.metrics.description=Carga útil de métricas de actividad globales y segmentadas por tiempo para un solo desarrollador.
openapi.dto.metrics.from=Fecha límite de inicio de la agregación global.
openapi.dto.metrics.to=Fecha límite de fin de la agregación global.
openapi.dto.metrics.metric=Indicadores clave de rendimiento agregados durante todo el período.
openapi.dto.metrics.userMetricsByGranularity=Lista de métricas desglosadas en franjas horarias cronológicas según la granularidad solicitada.

# -----------------------------------------------------------------------------
# MetricDto (Detalles de Estadísticas Agregadas)
# -----------------------------------------------------------------------------
openapi.dto.metric.description=Estadísticas clave de rendimiento calculadas a partir de los ciclos de vida de las incidencias.
openapi.dto.metric.numberOfIssueStarted=Número total de incidencias movidas a un estado de trabajo activo.
openapi.dto.metric.numberOfIssueDone=Número total de incidencias completadas con éxito o cerradas.
openapi.dto.metric.averageCycleTime=Tiempo de ciclo promedio para terminar una incidencia de principio a fin (formato de duración ISO-8601).
openapi.dto.metric.averageReviewTime=Tiempo promedio que una incidencia permanece en espera o en estado de revisión por pares.
openapi.dto.metric.numberOfReviewDone=Número total de revisiones de código de pares procesadas o aprobadas por el usuario.
openapi.dto.metric.numberOfReviewReopened=Número total de revisiones de pares rechazadas y devueltas para corrección.
openapi.dto.metric.teamReviewParticipationRate=Tasa de participación en el total de revisiones de pares del equipo (porcentaje).
openapi.dto.metric.deliverySuccessRate=Proporción de tareas completadas a tiempo sin ser reabiertas.
openapi.dto.metric.pingPongReviewRate=Tasa de revisiones de ida y vuelta entre autor y revisor.
openapi.dto.metric.parallelIssuesInProgressRate=Tasa de manejo concurrente de múltiples tickets activos.
openapi.dto.metric.issueRateByType=Porcentaje de distribución de incidencias completadas agrupadas por su tipo (ej: Bug, Tarea).

# -----------------------------------------------------------------------------
# PeriodicUserMetricsDto (Porciones Segmentadas por Tiempo)
# -----------------------------------------------------------------------------
openapi.dto.periodic.description=Representación de una porción de actividad para un bloque de período específico.
openapi.dto.periodic.from=Fecha límite de inicio del intervalo.
openapi.dto.periodic.to=Fecha límite de fin del intervalo.
openapi.dto.periodic.label=Etiqueta legible por humanos del bloque temporal actual.
openapi.dto.periodic.metrics=Estadísticas de rendimiento calculadas dentro del contexto de este bloque de tiempo.