###############################################################################
# =============================================================================
# SWAGGER GENERAL DOCUMENTATION
# =============================================================================
###############################################################################

openapi.info.title=API Backend Jiradar
openapi.info.description=API REST pour la collecte de métriques et d'historiques à partir des outils de suivi des incidents.

###############################################################################
# =============================================================================
# COUCHE CONTRÔLEUR - DOCUMENTATION DES ENDPOINTS
# =============================================================================
###############################################################################

# --- Tags Globaux & Paramètres de Chemin Communs ---
openapi.endpoint.user.tag.description=Endpoints permettant de récupérer les profils, métriques et historiques des utilisateurs.
openapi.endpoint.user.param.tracker=L'identifiant du fournisseur de suivi de tickets (ex: jira, gitlab).

# --- GET /me : Infos du Profil ---
openapi.endpoint.user.me.summary=Récupérer l'utilisateur authentifié
openapi.endpoint.user.me.description=Retourne le profil complet de l'utilisateur actuellement authentifié sur l'outil de suivi.

# --- GET /me/metrics : Analytique Principale ---
openapi.endpoint.user.metrics.summary=Calculer les métriques de performance
openapi.endpoint.user.metrics.description=Génère des rapports d'activité développeur filtrés par projets et plage de dates.

# --- GET /me/history : Chronologie Paginée ---
openapi.endpoint.user.history.summary=Récupérer l'historique d'activité
openapi.endpoint.user.history.description=Retourne une liste paginée, anti-chronologique, des événements du cycle de vie de l'utilisateur.

###############################################################################
# =============================================================================
# OBJETS DE TRANSFERT DE DONNÉES (DTO) - COUCHE SCHÉMA
# =============================================================================
###############################################################################

# -----------------------------------------------------------------------------
# UserDto
# -----------------------------------------------------------------------------
openapi.dto.user.description=Détails du profil d'un utilisateur.
openapi.dto.user.email=Adresse email professionnelle de l'utilisateur.
openapi.dto.user.name=Nom complet affiché de l'utilisateur.

# -----------------------------------------------------------------------------
# UserHistoryEventDto
# -----------------------------------------------------------------------------
openapi.dto.history.description=Détails d'un événement historique déclenché par la transition d'un utilisateur sur un ticket.
openapi.dto.history.issueKey=Clé d'identification métier unique du ticket.
openapi.dto.history.issueSummary=Titre résumé du ticket.
openapi.dto.history.issueType=Catégorie du type de ticket suivi.
openapi.dto.history.date=Date et heure d'occurrence de l'événement (format ISO 8601).
openapi.dto.history.transitionType=Chemin du statut de transition de workflow exécuté.

# -----------------------------------------------------------------------------
# UserMetricsDto (Enveloppe Racine)
# -----------------------------------------------------------------------------
openapi.dto.metrics.description=Charge utile des métriques d'activité globales et segmentées dans le temps pour un seul développeur.
openapi.dto.metrics.from=Date de début globale de l'agrégation.
openapi.dto.metrics.to=Date de fin globale de l'agrégation.
openapi.dto.metrics.metric=Indicateurs de performance clés agrégés sur toute la période.
openapi.dto.metrics.userMetricsByGranularity=Liste des métriques réparties en créneaux temporels chronologiques selon la granularité demandée.

# -----------------------------------------------------------------------------
# MetricDto (Détails des Statistiques Agrégées)
# -----------------------------------------------------------------------------
openapi.dto.metric.description=Statistiques clés de performance calculées à partir des cycles de vie des tickets.
openapi.dto.metric.numberOfIssueStarted=Nombre total de tickets passés en état de travail actif.
openapi.dto.metric.numberOfIssueDone=Nombre total de tickets terminés avec succès ou fermés.
openapi.dto.metric.averageCycleTime=Temps de cycle moyen pour terminer un ticket du début à la fin (format de durée ISO-8601).
openapi.dto.metric.averageReviewTime=Temps moyen d'attente ou de passage d'un ticket en statut de revue par les pairs.
openapi.dto.metric.numberOfReviewDone=Nombre total de revues de code traitées ou approuvées par l'utilisateur.
openapi.dto.metric.numberOfReviewReopened=Nombre total de revues rejetées et renvoyées pour correction.
openapi.dto.metric.teamReviewParticipationRate=Taux de participation aux revues d'équipe totales (pourcentage).
openapi.dto.metric.deliverySuccessRate=Ratio de tâches terminées à temps sans être réouvertes.
openapi.dto.metric.pingPongReviewRate=Taux d'allers-retours en revue entre l'auteur et le relecteur.
openapi.dto.metric.parallelIssuesInProgressRate=Taux de traitement simultané de plusieurs tickets actifs.
openapi.dto.metric.issueRateByType=Pourcentage de répartition des tickets terminés regroupés par leur type (ex: Bug, Tâche).

# -----------------------------------------------------------------------------
# PeriodicUserMetricsDto (Tranches Segmentées par Temps)
# -----------------------------------------------------------------------------
openapi.dto.periodic.description=Représentation d'une tranche d'activité pour une période spécifique.
openapi.dto.periodic.from=Date de début de l'intervalle.
openapi.dto.periodic.to=Date de fin de l'intervalle.
openapi.dto.periodic.label=Libellé lisible par l'homme du créneau temporel actuel.
openapi.dto.periodic.metrics=Statistiques de performance calculées dans le contexte de ce bloc temporel.