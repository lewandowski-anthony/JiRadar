###############################################################################
# =============================================================================
# SWAGGER GENERAL DOCUMENTATION
# =============================================================================
###############################################################################

openapi.info.title=Jiradar Backend API
openapi.info.description=REST API for collecting metrics and history logs from issue tracking tools.

###############################################################################
# =============================================================================
# CONTROLLER LAYER - ENDPOINTS DOCUMENTATION
# =============================================================================
###############################################################################

# --- Global Tags & Common Path Parameters ---
openapi.endpoint.user.tag.description=Endpoints for retrieving user profiles, metrics, and history logs.
openapi.endpoint.user.param.tracker=The issue tracker provider identifier (e.g., jira, gitlab).

# --- GET /me : Profile Info ---
openapi.endpoint.user.me.summary=Get authenticated user
openapi.endpoint.user.me.description=Returns the complete profile of the currently authenticated user on the tracker.

# --- GET /me/metrics : Core Analytics ---
openapi.endpoint.user.metrics.summary=Calculate performance metrics
openapi.endpoint.user.metrics.description=Generates developer activity reports filtered by projects and date range.

# --- GET /me/history : Paginated Timeline ---
openapi.endpoint.user.history.summary=Retrieve activity history
openapi.endpoint.user.history.description=Returns a paginated, reverse-chronological list of user lifecycle events.


###############################################################################
# =============================================================================
# DATA TRANSFER OBJECTS (DTO) - SCHEMA LAYER
# =============================================================================
###############################################################################

# -----------------------------------------------------------------------------
# UserDto
# -----------------------------------------------------------------------------
openapi.dto.user.description=Information profile details of a user.
openapi.dto.user.email=Professional email address of the user.
openapi.dto.user.name=Full display name of the user.

# -----------------------------------------------------------------------------
# UserHistoryEventDto
# -----------------------------------------------------------------------------
openapi.dto.history.description=Details of a historical event triggered by a user transition on an issue.
openapi.dto.history.issueKey=Unique business identifier key of the issue.
openapi.dto.history.issueSummary=Short summary title of the issue.
openapi.dto.history.issueType=Type category of the tracked issue.
openapi.dto.history.date=Date and time when the event occurred (ISO 8601 format).
openapi.dto.history.transitionType=Workflow transition status path executed.

# -----------------------------------------------------------------------------
# UserMetricsDto (Root Wrapper)
# -----------------------------------------------------------------------------
openapi.dto.metrics.description=Global and timeline-segmented activity metrics payload for a single developer.
openapi.dto.metrics.from=Global aggregation start date boundary.
openapi.dto.metrics.to=Global aggregation end date boundary.
openapi.dto.metrics.metric=Aggregated core performance indicators over the whole period.
openapi.dto.metrics.userMetricsByGranularity=List of metrics broken down into chronological time slots according to requested granularity.

# -----------------------------------------------------------------------------
# MetricDto (Aggregated Statistics Details)
# -----------------------------------------------------------------------------
openapi.dto.metric.description=Core key performance statistics computed from issue lifecycles.
openapi.dto.metric.numberOfIssueStarted=Total number of issues moved into an active working state.
openapi.dto.metric.numberOfIssueDone=Total number of issues successfully completed or closed.
openapi.dto.metric.averageCycleTime=Average cycle time to finish an issue from start to done (ISO-8601 duration format).
openapi.dto.metric.averageReviewTime=Average time an issue stays waiting for or inside peer review status.
openapi.dto.metric.numberOfReviewDone=Total number of peer code reviews processed or approved by the user.
openapi.dto.metric.numberOfReviewReopened=Total number of peer reviews rejected and pushed back for rework.
openapi.dto.metric.teamReviewParticipationRate=Participation rate in total team peer reviews (percentage).
openapi.dto.metric.deliverySuccessRate=Ratio of tasks completed on time without being reopened.
openapi.dto.metric.pingPongReviewRate=Back-and-forth review rate between author and reviewer.
openapi.dto.metric.parallelIssuesInProgressRate=Rate of handling multiple active tickets concurrently.
openapi.dto.metric.issueRateByType=Distribution share percentage of completed issues grouped by their type (e.g., Bug, Task).

# -----------------------------------------------------------------------------
# PeriodicUserMetricsDto (Time-Segmented Slices)
# -----------------------------------------------------------------------------
openapi.dto.periodic.description=Activity slice representation for a specific period block.
openapi.dto.periodic.from=Interval bucket start boundary date.
openapi.dto.periodic.to=Interval bucket end boundary date.
openapi.dto.periodic.label=Human-readable label of the current temporal slot block.
openapi.dto.periodic.metrics=Performance statistics calculated inside this time block context.