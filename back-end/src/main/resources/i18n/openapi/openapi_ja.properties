###############################################################################
# =============================================================================
# SWAGGER GENERAL DOCUMENTATION
# =============================================================================
###############################################################################

openapi.info.title=Jiradar バックエンド API
openapi.info.description=課題追跡ツールからメトリクスと履歴ログを収集するための REST API。

###############################################################################
# =============================================================================
# コントローラー層 - エンドポイントドキュメント
# =============================================================================
###############################################################################

# --- グローバルタグと共通パスパラメーター ---
openapi.endpoint.user.tag.description=ユーザープロファイル、メトリクス、履歴ログを取得するためのエンドポイント。
openapi.endpoint.user.param.tracker=課題トラッカープロバイダーの識別子（例：jira、gitlab）。

# --- GET /me : プロファイル情報 ---
openapi.endpoint.user.me.summary=認証済みユーザーの取得
openapi.endpoint.user.me.description=トラッカーで現在認証されているユーザーの完全なプロファイルを返します。

# --- GET /me/metrics : コア分析 ---
openapi.endpoint.user.metrics.summary=パフォーマンスメトリクスの計算
openapi.endpoint.user.metrics.description=プロジェクトと日付範囲でフィルタリングされた開発者のアクティビティレポートを生成します。

# --- GET /me/history : ページネーションされたタイムライン ---
openapi.endpoint.user.history.summary=アクティビティ履歴の取得
openapi.endpoint.user.history.description=ユーザーのライフサイクルイベントのページネーションされた逆時系列リストを返します。

###############################################################################
# =============================================================================
# データ転送オブジェクト (DTO) - スキーマ層
# =============================================================================
###############################################################################

# -----------------------------------------------------------------------------
# UserDto
# -----------------------------------------------------------------------------
openapi.dto.user.description=ユーザーのプロファイル詳細情報。
openapi.dto.user.email=ユーザーの業務用メールアドレス。
openapi.dto.user.name=ユーザーの表示用フルネーム。

# -----------------------------------------------------------------------------
# UserHistoryEventDto
# -----------------------------------------------------------------------------
openapi.dto.history.description=課題でのユーザーの移行によってトリガーされた履歴イベントの詳細。
openapi.dto.history.issueKey=課題の一意のビジネス識別子キー。
openapi.dto.history.issueSummary=課題の短い概要タイトル。
openapi.dto.history.issueType=追跡される課題のタイプカテゴリ。
openapi.dto.history.date=イベントが発生した日時（ISO 8601形式）。
openapi.dto.history.transitionType=実行されたワークフロー移行ステータスのパス。

# -----------------------------------------------------------------------------
# UserMetricsDto (ルートラッパー)
# -----------------------------------------------------------------------------
openapi.dto.metrics.description=単一の開発者のためのグローバルおよびタイムラインセグメント化されたアクティビティメトリクスのペイロード。
openapi.dto.metrics.from=グローバル集計の開始境界日。
openapi.dto.metrics.to=グローバル集計の終了境界日。
openapi.dto.metrics.metric=期間全体の集計されたコアパフォーマンス指標。
openapi.dto.metrics.userMetricsByGranularity=要求された粒度に従って時系列のタイムスロットに分割されたメトリクスのリスト。

# -----------------------------------------------------------------------------
# MetricDto (集計統計の詳細)
# -----------------------------------------------------------------------------
openapi.dto.metric.description=課題のライフサイクルから計算されたコア主要パフォーマンス統計。
openapi.dto.metric.numberOfIssueStarted=アクティブな作業状態に移行した課題の総数。
openapi.dto.metric.numberOfIssueDone=正常に完了またはクローズされた課題の総数。
openapi.dto.metric.averageCycleTime=課題を開始から完了まで終わらせるための平均サイクルタイム（ISO-8601 期間形式）。
openapi.dto.metric.averageReviewTime=課題がピアレビューを待機している、またはピアレビュー中である平均時間。
openapi.dto.metric.numberOfReviewDone=ユーザーによって処理または承認されたピアコードレビューの総数。
openapi.dto.metric.numberOfReviewReopened=拒否され、再作業のために押し戻されたピアレビューの総数。
openapi.dto.metric.teamReviewParticipationRate=チーム全体のピアレビューへの参加率（パーセンテージ）。
openapi.dto.metric.deliverySuccessRate=再開されずに期限内に完了したタスクの割合。
openapi.dto.metric.pingPongReviewRate=作成者とレビュアー間のレビューの往復率。
openapi.dto.metric.parallelIssuesInProgressRate=複数のアクティブなチケットを同時に処理する割合。
openapi.dto.metric.issueRateByType=タイプ（バグ、タスクなど）ごとにグループ化された完了済み課題の分布シェアのパーセンテージ。

# -----------------------------------------------------------------------------
# PeriodicUserMetricsDto (時間セグメント化されたスライス)
# -----------------------------------------------------------------------------
openapi.dto.periodic.description=特定の期間ブロックのアクティビティスライス表現。
openapi.dto.periodic.from=インターバルバケットの開始境界日。
openapi.dto.periodic.to=インターバルバケットの終了境界日。
openapi.dto.periodic.label=現在の時間スロットブロックの人間が読めるラベル。
openapi.dto.periodic.metrics=この時間ブロックのコンテキスト内で計算されたパフォーマンス統計。