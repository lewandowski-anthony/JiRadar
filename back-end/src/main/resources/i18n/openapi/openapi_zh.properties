###############################################################################
# =============================================================================
# SWAGGER GENERAL DOCUMENTATION
# =============================================================================
###############################################################################

openapi.info.title=API Backend Jiradar
openapi.info.description=用于收集问题跟踪工具的指标和历史记录的 REST API。

###############################################################################
# =============================================================================
# 控制器层 - 端点文档
# =============================================================================
###############################################################################

# --- 全局标签和公共路径参数 ---
openapi.endpoint.user.tag.description=用于获取用户个人资料、指标和历史日志的端点。
openapi.endpoint.user.param.tracker=问题跟踪器提供商的标识符（例如：jira，gitlab）。

# --- GET /me : 个人资料信息 ---
openapi.endpoint.user.me.summary=获取经过身份验证的用户
openapi.endpoint.user.me.description=返回当前在跟踪器上经过身份验证的用户的完整个人资料。

# --- GET /me/metrics : 核心分析 ---
openapi.endpoint.user.metrics.summary=计算性能指标
openapi.endpoint.user.metrics.description=生成按项目和日期范围过滤的开发人员活动报告。

# --- GET /me/history : 分页时间线 ---
openapi.endpoint.user.history.summary=检索活动历史记录
openapi.endpoint.user.history.description=返回用户生命周期事件的分页、按时间倒序排列的列表。

###############################################################################
# =============================================================================
# 数据传输对象 (DTO) - 模式层
# =============================================================================
###############################################################################

# -----------------------------------------------------------------------------
# UserDto
# -----------------------------------------------------------------------------
openapi.dto.user.description=用户的个人资料详细信息。
openapi.dto.user.email=用户的专业电子邮件地址。
openapi.dto.user.name=用户的完整显示名称。

# -----------------------------------------------------------------------------
# UserHistoryEventDto
# -----------------------------------------------------------------------------
openapi.dto.history.description=由用户在问题上的转换触发的历史事件的详细信息。
openapi.dto.history.issueKey=问题的唯一业务标识符键。
openapi.dto.history.issueSummary=问题的简短摘要标题。
openapi.dto.history.issueType=被跟踪问题的类型类别。
openapi.dto.history.date=事件发生的日期和时间（ISO 8601格式）。
openapi.dto.history.transitionType=执行的工作流转换状态路径。

# -----------------------------------------------------------------------------
# UserMetricsDto (根包装器)
# -----------------------------------------------------------------------------
openapi.dto.metrics.description=单个开发人员的全局和按时间线分段的活动指标有效负载。
openapi.dto.metrics.from=全局聚合开始边界日期。
openapi.dto.metrics.to=全局聚合结束边界日期。
openapi.dto.metrics.metric=整个期间聚合的核心绩效指标。
openapi.dto.metrics.userMetricsByGranularity=根据请求的粒度分解为按时间顺序排列的时间段的指标列表。

# -----------------------------------------------------------------------------
# MetricDto (汇总统计详情)
# -----------------------------------------------------------------------------
openapi.dto.metric.description=从问题生命周期计算出的核心关键绩效统计数据。
openapi.dto.metric.numberOfIssueStarted=移入活动工作状态的问题总数。
openapi.dto.metric.numberOfIssueDone=成功完成或关闭的问题总数。
openapi.dto.metric.averageCycleTime=从开始到完成处理一个问题的平均周期时间（ISO-8601 持续时间格式）。
openapi.dto.metric.averageReviewTime=问题等待或处于同行评审状态的平均时间。
openapi.dto.metric.numberOfReviewDone=用户处理或批准的同行代码评审总数。
openapi.dto.metric.numberOfReviewReopened=被拒绝并退回返工的同行评审总数。
openapi.dto.metric.teamReviewParticipationRate=在团队同行评审总数中的参与率（百分比）。
openapi.dto.metric.deliverySuccessRate=按时完成且未被重新打开的任务的比例。
openapi.dto.metric.pingPongReviewRate=作者和评审者之间的来回评审率。
openapi.dto.metric.parallelIssuesInProgressRate=并发处理多个活动票证的比率。
openapi.dto.metric.issueRateByType=按类型（例如，Bug，Task）分组的已完成问题的分布份额百分比。

# -----------------------------------------------------------------------------
# PeriodicUserMetricsDto (按时间分段的切片)
# -----------------------------------------------------------------------------
openapi.dto.periodic.description=特定期间块的活动切片表示。
openapi.dto.periodic.from=间隔桶开始边界日期。
openapi.dto.periodic.to=间隔桶结束边界日期。
openapi.dto.periodic.label=当前时间段块的人类可读标签。
openapi.dto.periodic.metrics=在此时间块上下文中计算的绩效统计数据。