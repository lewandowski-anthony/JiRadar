###############################################################################
# =============================================================================
# SWAGGER GENERAL DOCUMENTATION
# =============================================================================
###############################################################################

openapi.info.title=API Backend Jiradar
openapi.info.description=API REST para a coleta de métricas e históricos de ferramentas de rastreamento de problemas.

###############################################################################
# =============================================================================
# CAMADA DE CONTROLADOR - DOCUMENTAÇÃO DE ENDPOINTS
# =============================================================================
###############################################################################

# --- Tags Globais e Parâmetros de Rota Comuns ---
openapi.endpoint.user.tag.description=Endpoints para recuperar perfis, métricas e históricos de usuários.
openapi.endpoint.user.param.tracker=O identificador do provedor de rastreamento de problemas (ex: jira, gitlab).

# --- GET /me : Informações do Perfil ---
openapi.endpoint.user.me.summary=Obter usuário autenticado
openapi.endpoint.user.me.description=Retorna o perfil completo do usuário atualmente autenticado no rastreador.

# --- GET /me/metrics : Análise Principal ---
openapi.endpoint.user.metrics.summary=Calcular métricas de desempenho
openapi.endpoint.user.metrics.description=Gera relatórios de atividade do desenvolvedor filtrados por projetos e intervalo de datas.

# --- GET /me/history : Cronologia Paginada ---
openapi.endpoint.user.history.summary=Recuperar histórico de atividade
openapi.endpoint.user.history.description=Retorna uma lista paginada e em ordem cronológica inversa dos eventos do ciclo de vida do usuário.

###############################################################################
# =============================================================================
# OBJETOS DE TRANSFERÊNCIA DE DADOS (DTO) - CAMADA DE ESQUEMA
# =============================================================================
###############################################################################

# -----------------------------------------------------------------------------
# UserDto
# -----------------------------------------------------------------------------
openapi.dto.user.description=Detalhes do perfil de informações de um usuário.
openapi.dto.user.email=Endereço de e-mail profissional do usuário.
openapi.dto.user.name=Nome completo de exibição do usuário.

# -----------------------------------------------------------------------------
# UserHistoryEventDto
# -----------------------------------------------------------------------------
openapi.dto.history.description=Detalhes de um evento histórico acionado pela transição de um usuário em um problema.
openapi.dto.history.issueKey=Chave de identificação comercial exclusiva do problema.
openapi.dto.history.issueSummary=Título resumido do problema.
openapi.dto.history.issueType=Categoria de tipo do problema rastreado.
openapi.dto.history.date=Data e hora em que o evento ocorreu (formato ISO 8601).
openapi.dto.history.transitionType=Caminho de status de transição de fluxo de trabalho executado.

# -----------------------------------------------------------------------------
# UserMetricsDto (Invólucro Raiz)
# -----------------------------------------------------------------------------
openapi.dto.metrics.description=Carga útil de métricas de atividade globais e segmentadas por tempo para um único desenvolvedor.
openapi.dto.metrics.from=Data limite de início da agregação global.
openapi.dto.metrics.to=Data limite de término da agregação global.
openapi.dto.metrics.metric=Principais indicadores de desempenho agregados ao longo de todo o período.
openapi.dto.metrics.userMetricsByGranularity=Lista de métricas divididas em blocos de tempo cronológicos de acordo com a granularidade solicitada.

# -----------------------------------------------------------------------------
# MetricDto (Detalhes de Estatísticas Agregadas)
# -----------------------------------------------------------------------------
openapi.dto.metric.description=Principais estatísticas de desempenho calculadas a partir dos ciclos de vida dos problemas.
openapi.dto.metric.numberOfIssueStarted=Número total de problemas movidos para um estado de trabalho ativo.
openapi.dto.metric.numberOfIssueDone=Número total de problemas concluídos com êxito ou fechados.
openapi.dto.metric.averageCycleTime=Tempo de ciclo médio para terminar um problema do início ao fim (formato de duração ISO-8601).
openapi.dto.metric.averageReviewTime=Tempo médio que um problema fica aguardando ou em status de revisão por pares.
openapi.dto.metric.numberOfReviewDone=Número total de revisões de código de pares processadas ou aprovadas pelo usuário.
openapi.dto.metric.numberOfReviewReopened=Número total de revisões de pares rejeitadas e devolvidas para retrabalho.
openapi.dto.metric.teamReviewParticipationRate=Taxa de participação no total de revisões de pares da equipe (porcentagem).
openapi.dto.metric.deliverySuccessRate=Proporção de tarefas concluídas no prazo sem serem reabertas.
openapi.dto.metric.pingPongReviewRate=Taxa de idas e vindas de revisão entre autor e revisor.
openapi.dto.metric.parallelIssuesInProgressRate=Taxa de tratamento simultâneo de vários tickets ativos.
openapi.dto.metric.issueRateByType=Porcentagem de distribuição de problemas concluídos agrupados por tipo (ex: Bug, Tarefa).

# -----------------------------------------------------------------------------
# PeriodicUserMetricsDto (Fatias Segmentadas por Tempo)
# -----------------------------------------------------------------------------
openapi.dto.periodic.description=Representação de uma fatia de atividade para um bloco de período específico.
openapi.dto.periodic.from=Data limite de início do intervalo.
openapi.dto.periodic.to=Data limite de término do intervalo.
openapi.dto.periodic.label=Rótulo legível do bloco de intervalo temporal atual.
openapi.dto.periodic.metrics=Estatísticas de desempenho calculadas no contexto deste bloco de tempo.